services:
  bot:
    build: .
    # Host port 3002 on the VM (container still listens on 3000). Override: PUBLISH_PORT=3000 npm/docker compose up
    ports:
      - "${PUBLISH_PORT:-3002}:3000"
    environment:
      # Override for local runs without HTTPS (Telegram still needs a public URL for webhooks).
      BOT_TRANSPORT: ${BOT_TRANSPORT:-webhook}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      MONGODB_URL: ${MONGODB_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      PORT: 3000
