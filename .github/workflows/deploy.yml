# Build, push to GHCR (public), deploy to Oracle VM over SSH — same pattern as
# https://github.com/MHMALEK/telegram-iranian-money-exchange-bot/blob/main/.github/workflows/deploy.yml
#
# Secrets (repository → Settings → Secrets and variables → Actions), same VM_* / TELEGRAM_BOT_TOKEN style:
#   VM_HOST, VM_USER, VM_SSH_KEY, TELEGRAM_BOT_TOKEN, WEBHOOK_URL
#   MONGODB_URL or DATABASE_URL (Mongo URI; app reads MONGODB_URL inside the container)
# Optional: TELEGRAM_WEBHOOK_SECRET
#
# Container listens on 3000; VM maps host port 3002 → 3000 (reverse proxy to http://127.0.0.1:3002).
#
# After first push: GitHub → Packages → this image → Package settings → Change visibility → Public
# so the VPS can `docker pull` without login (matches the exchange-bot setup).

name: Build and deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-vm-persian-poems
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=${REGISTRY}/$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VM
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          envs: TELEGRAM_BOT_TOKEN,MONGODB_URL,DATABASE_URL,WEBHOOK_URL,TELEGRAM_WEBHOOK_SECRET
          script: |
            set -e
            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
              echo "TELEGRAM_BOT_TOKEN must be set (GitHub Actions secret)"
              exit 1
            fi
            if [ -z "${WEBHOOK_URL:-}" ]; then
              echo "WEBHOOK_URL must be set (public https URL for Telegram webhook)"
              exit 1
            fi
            export MONGODB_URL="${MONGODB_URL:-${DATABASE_URL:-}}"
            if [ -z "${MONGODB_URL:-}" ]; then
              echo "MONGODB_URL or DATABASE_URL must be set (MongoDB connection string)"
              exit 1
            fi
            E="-e TELEGRAM_BOT_TOKEN -e MONGODB_URL -e WEBHOOK_URL"
            if [ -n "${TELEGRAM_WEBHOOK_SECRET:-}" ]; then E="$E -e TELEGRAM_WEBHOOK_SECRET"; fi
            # Public GHCR image: anonymous pull on the VPS (no docker login).
            if ! docker pull "${{ env.IMAGE_NAME }}:latest"; then
              echo "docker pull failed (is the package public on GHCR?)"
              exit 1
            fi
            docker stop persian-poems 2>/dev/null || true
            docker rm persian-poems 2>/dev/null || true
            if ! docker run -d \
              --name persian-poems \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e BOT_TRANSPORT=webhook \
              $E \
              -p 3002:3000 \
              "${{ env.IMAGE_NAME }}:latest"; then
              echo "docker run failed"
              exit 1
            fi
            docker image prune -f || true
