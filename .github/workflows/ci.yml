# TypeScript compile on pull requests (Docker build + deploy run on main via deploy.yml).

name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
